  <text x="268" y="365" font-size="12" fill="#4b5563">Clean &amp; Maintainable Code</text>
  <circle cx="258" cy="378" r="3" fill="#1D9E75"/>
  <text x="268" y="382" font-size="12" fill="#4b5563">Accessible Interfaces</text>
  <circle cx="258" cy="395" r="3" fill="#1D9E75"/>
  <text x="268" y="399" font-size="12" fill="#4b5563">User-Centered Design</text>

